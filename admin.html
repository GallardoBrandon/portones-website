<!-- VISTA ADMIN -->
<div id="adminView" class="view" style="display: none;">
  <header class="admin-header-main">
    <div class="container">
      <h1>Panel Administrativo</h1>
      <button id="logoutBtn" class="logout-btn">Cerrar Sesión</button>
    </div>
  </header>

  <main class="container admin-main">
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="prices">Productos</button>
      <button class="tab-btn" data-tab="images">Subir Imágenes</button>
    </div>

    <!-- Tab Precios -->
    <div id="pricesTab" class="tab-content active">
      <div class="admin-section-header">
        <h3>Productos</h3>
        <button type="button" id="addProductBtn" class="btn-add-product">+ Agregar producto</button>
      </div>
      <div id="pricesList" class="prices-list"></div>
    </div>

    <!-- Tab Imágenes -->
    <div id="imagesTab" class="tab-content">
      <h3>Subir Imágenes</h3>
      <form id="uploadForm" class="upload-form">
        <div class="form-group">
          <label for="imageTitle">Título de la imagen:</label>
          <input type="text" id="imageTitle" required>
        </div>
        <div class="form-group">
          <label for="imageInput">Seleccionar imagen:</label>
          <input type="file" id="imageInput" accept="image/*" required>
        </div>
        <div id="imagePreview" class="image-preview"></div>
        <button type="submit">Subir Imagen</button>
      </form>
      <h4>Imágenes cargadas:</h4>
      <div id="uploadedImages" class="uploaded-images"></div>
    </div>
  </main>
</div>
